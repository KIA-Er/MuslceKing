version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: muscleking_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: muscleking_db
      MYSQL_USER: muscleking_user
      MYSQL_PASSWORD: musclepass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
